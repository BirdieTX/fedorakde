%post --log=/root/ks-post.log

set -e

echo "Starting post-install setup..."

# Add Brave repository
dnf5 config-manager addrepo --from-repofile=https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo

# Add Terra repository
dnf5 install -y --nogpgcheck --repofrompath 'terra,https://repos.fyralabs.com/terra$releasever' terra-release

# Add ProtonVPN repository
wget "https://repo.protonvpn.com/fedora-$(cat /etc/fedora-release | cut -d' ' -f 3)-stable/protonvpn-stable-release/protonvpn-stable-release-1.0.3-1.noarch.rpm"

# Enable RPM Fusion, Terra and Proton VPN repositories
dnf5 install -y \
    terra-release-extras \
    terra-release-mesa \
    ./protonvpn-stable-release-1.0.3-1.noarch.rpm \
    "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm" \
    "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm"

# Remove unwanted KDE packages
dnf5 remove -y \
    dragon \
    kde-partitionmanager \
    kleopatra \
    kmail \
    kmailtransport \
    kompare \
    korganizer \
    kmouth \
    krdc \
    neochat

# Upgrade system
dnf5 upgrade --allowerasing --allow-downgrade --skip-unavailable --refresh -y

# Install packages
dnf5 install --allowerasing -y \
    alacritty \
    antimicrox \
    audacity-freeworld \
